services:
  postgres:
    image: postgres:16
    container_name: swchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - /opt/swchat/data/postgres:/var/lib/postgresql/data
    networks:
      - swchat

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: swchat-synapse
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SYNAPSE_SERVER_NAME: ${SERVER_NAME:-matrix.stackworks.ru}
      SYNAPSE_REPORT_STATS: ${REPORT_STATS:-no}
    volumes:
      - /opt/swchat/data/synapse:/data
    ports:
      - '127.0.0.1:8008:8008'
    networks:
      - swchat

networks:
  swchat:
    driver: bridge
